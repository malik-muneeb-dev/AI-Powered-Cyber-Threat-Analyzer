<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Cyber Threat Analyzer</title>

   <style>

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        background: #050b10;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Orbitron', sans-serif; 
        color: #00f7ff;
    }

    .register-box {
        width: 400px; 
        padding: 30px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #00f7ff;
        box-shadow: 0 0 15px #00f7ff;
        border-radius: 12px;
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
        letter-spacing: 2px;
        font-size: 1.5rem;
    }

    input {
        width: 100%;
        padding: 12px; 
        margin-top: 15px; 
        background: rgba(0, 247, 255, 0.05); 
        border: 1px solid #00f7ff;
        color: #00f7ff;
        border-radius: 6px;
        outline: none;
        display: block; 
    }

    button {
        width: 100%;
        margin-top: 25px;
        padding: 12px;
        background: #00f7ff;
        border: none;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        border-radius: 6px;
        font-family: inherit;
        text-transform: uppercase;
    }

    button:hover {
        background: #00cfd6;
        box-shadow: 0 0 10px #00f7ff;
    }

    .back-btn {
        display: block;
        width: 100%; 
        margin-top: 15px;
        padding: 10px;
        border: 1px solid #00f7ff;
        border-radius: 6px;
        color: #00f7ff;
        text-decoration: none;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: rgba(0, 247, 255, 0.1);
        color: #00f7ff;
    }

    a {
        color: #00f7ff;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    p {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.8;
    }
</style>
      
</head>
<body>

<div class="register-box">
    <h2>📝 USER REGISTRATION</h2>
{% with messages = get_flashed_messages()%}
  {% if messages %}
    <div class="flash-messages">
      {% for message in messages %}
       
          {{ message }}
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<form method="POST" action="/register">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">REGISTER</button>
    </form>

<!--  Back to Dashboard -->
    <a href="/" class="back-btn"> ⬅ Back to Dashboard</a>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>
</div>

</body>
</html>
