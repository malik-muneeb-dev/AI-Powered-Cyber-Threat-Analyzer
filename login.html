<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Cyber Threat Analyzer</title>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        height: 100vh;
        background: #050b10;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        color: #00f7ff;
    }

    .login-box {
        width: 380px; 
        padding: 30px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #00f7ff;
        box-shadow: 0 0 15px #00f7ff;
        border-radius: 10px;
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    input {
        width: 100%; 
        padding: 12px;
        margin-top: 15px;
        background: transparent;
        border: 1px solid #00f7ff;
        color: #00f7ff;
        border-radius: 5px;
        outline: none;
        display: block; 
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 12px;
        background: #00f7ff;
        border: none;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.3s;
    }

    button:hover {
        background: #00cfd6;
        box-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
    }

    .back-btn {
        display: block;
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: 1px solid #00f7ff;
        border-radius: 5px;
        color: #00f7ff;
        text-decoration: none;
        transition: 0.3s;
        text-align: center;
    }

    .back-btn:hover {
        background: #00f7ff;
        color: #000;
    }

    a {
        color: #00f7ff;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    p {
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.9;
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>🔐 USER LOGIN</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">LOGIN</button>
    </form>

    <!--  Back to Dashboard Button -->
    <a href="/" class="back-btn">⬅ Back to Dashboard</a>

    <p>
        New user?
        <a href="/register">Register here</a>
    </p>
</div>

</body>

</html>
